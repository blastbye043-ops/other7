    <!-- Anti-FOUC: instant background/foreground before the main CSS bundle

    <style>

    <!-- Fonts: Inter Variable is self-hosted (see index.css → @fontsource-variable/inter).
         No cross-origin font request needed — the preconnects below are removed. -->

    <!-- ═══════════════════════════════════════════════════════════════════
         Google Consent Mode v2 — must run BEFORE any measurement scripts.
         All consent types default to 'denied' until the user explicitly
         accepts via the cookie banner. analytics_storage / ad_storage etc.
         are updated by the React cookie consent hook after user interaction.
         ═══════════════════════════════════════════════════════════════════ -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() { dataLayer.push(arguments); }

      // Default: deny everything except security (required for GDPR compliance).
      gtag('consent', 'default', {
        ad_storage:             'denied',
        ad_user_data:           'denied',
        ad_personalization:     'denied',
        analytics_storage:      'denied',
        functionality_storage:  'denied',
        personalization_storage:'denied',
        security_storage:       'granted',
        wait_for_update:         500
      });

      // Minimise data leakage while consent is pending.
      gtag('set', 'ads_data_redaction', true);
      gtag('set', 'url_passthrough',    true);
    </script>

    <!--
      JSON-LD structured data is placed here at the end of <body> rather than
      in <head>. Google supports both positions equally. Keeping them here lets
      the HTML parser reach <div id="root"> and start the React bootstrap
      without first processing ~5 KB of structured-data JSON.
      (These are data scripts, not executable JS, so they are non-render-
      blocking either way — this is a parser-hygiene / DevTools hygiene win.)
    -->

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">

      "url": "https://ytoudown.com",

        "@type": "ImageObject",

        "email": "privacy@ytoudown.com"
      }
    }
    </script>

    </script>
