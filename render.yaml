services:
  - type: web
    name: ytoudown-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ytoudown-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false

databases:
  - name: ytoudown-db
    databaseName: ytoudown
    user: ytoudown
    plan: free
